# config/audisp-plugin.conf
# auditd dispatcher 플러그인 설정 파일
# 설치 위치: /etc/audisp/plugins.d/audit-daemon.conf  (구형 auditd)
#            /etc/audit/plugins.d/audit-daemon.conf   (신형 auditd 3.x+)

active = yes
direction = out
path = /usr/local/sbin/audit-daemon
type = always
args = /etc/audit-daemon/audit-daemon.conf
format = string

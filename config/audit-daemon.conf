# config/audit-daemon.conf

# mode: dispatcher(default) = auditd가 stdin으로 이벤트를 전달 (auditd와 공존)
#       standalone           = 직접 netlink 소켓 사용 (auditd 없는 환경)
mode=dispatcher

log_dir=/var/log/audit-daemon
log_retention_days=90
pid_file=/var/run/audit-daemon.pid
filter_system_daemons=true
queue_max_size=8192
